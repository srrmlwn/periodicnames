<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="250" cy="250" r="248"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circle-clip)">
    <!-- Four quadrants using element category colors -->
    <rect x="0"   y="0"   width="250" height="250" fill="#e03030"/> <!-- alkali red    TL -->
    <rect x="250" y="0"   width="250" height="250" fill="#f97316"/> <!-- alkaline orange TR -->
    <rect x="0"   y="250" width="250" height="250" fill="#2563eb"/> <!-- transition blue BL -->
    <rect x="250" y="250" width="250" height="250" fill="#7c3aed"/> <!-- metalloid purple BR -->

    <!-- Subtle white divider lines -->
    <line x1="250" y1="0"   x2="250" y2="500" stroke="white" stroke-width="3" opacity="0.4"/>
    <line x1="0"   y1="250" x2="500" y2="250" stroke="white" stroke-width="3" opacity="0.4"/>

    <!-- Dark border ring -->
    <circle cx="250" cy="250" r="244" fill="none" stroke="#111111" stroke-width="8"/>

    <!-- Atomic number: 119 -->
    <text
      x="432" y="108"
      font-family="Nunito, Arial, sans-serif"
      font-size="60" font-weight="900"
      fill="rgba(255,255,255,0.9)"
      text-anchor="end">119</text>

    <!-- Symbol: Pn -->
    <text
      x="250" y="332"
      font-family="Nunito, Arial, sans-serif"
      font-size="215" font-weight="900"
      fill="white"
      text-anchor="middle"
      dominant-baseline="auto">Pn</text>

    <!-- Element name: periodicnames -->
    <text
      x="250" y="430"
      font-family="Nunito, Arial, sans-serif"
      font-size="43" font-weight="700"
      fill="rgba(255,255,255,0.92)"
      text-anchor="middle"
      letter-spacing="1.5">periodicnames</text>
  </g>
</svg>
